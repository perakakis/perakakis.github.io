  <line x1="750" y1="0" x2="750" y2="630" stroke="rgba(10,22,40,0.07)" stroke-width="1"/>

  <!-- Teal accent bar top -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#teal)"/>

  <!-- Row 0: Archive -->
  <rect x="55" y="345" width="190" height="105" rx="10" fill="rgba(28,122,140,0.1)" stroke="rgba(28,122,140,0.4)" stroke-width="1.5"/>
  <text x="150" y="387" font-family="IBM Plex Mono, monospace" font-size="10" fill="rgba(28,122,140,0.9)" text-anchor="middle" letter-spacing="2">ARCHIVE</text>
  <text x="150" y="410" font-family="DM Sans, sans-serif" font-size="15" fill="#0a1628" text-anchor="middle">Institutional Repos</text>

  <rect x="265" y="345" width="190" height="105" rx="10" fill="rgba(28,122,140,0.18)" stroke="rgba(28,122,140,0.6)" stroke-width="1.5"/>
  <text x="360" y="387" font-family="IBM Plex Mono, monospace" font-size="10" fill="rgba(28,122,140,0.9)" text-anchor="middle" letter-spacing="2">ARCHIVE</text>
  <text x="360" y="410" font-family="DM Sans, sans-serif" font-size="15" fill="#0a1628" text-anchor="middle" font-weight="600">DIGITAL.CSIC</text>

  <rect x="475" y="345" width="190" height="105" rx="10" fill="rgba(28,122,140,0.1)" stroke="rgba(28,122,140,0.4)" stroke-width="1.5"/>
  <text x="570" y="387" font-family="IBM Plex Mono, monospace" font-size="10" fill="rgba(28,122,140,0.9)" text-anchor="middle" letter-spacing="2">ARCHIVE</text>
  <text x="570" y="410" font-family="DM Sans, sans-serif" font-size="15" fill="#0a1628" text-anchor="middle">Zenodo</text>

  <!-- Row 1: Review -->
  <rect x="55" y="215" width="130" height="95" rx="10" fill="rgba(91,138,58,0.09)" stroke="rgba(45,100,25,0.35)" stroke-width="1.5"/>
