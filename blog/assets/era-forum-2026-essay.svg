<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1c64c4"/>
      <stop offset="100%" stop-color="#2780e3"/>
    </linearGradient>
  </defs>

  <!-- White background -->
  <rect width="1200" height="630" fill="#ffffff"/>

  <!-- Site-blue accent bar top -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#blue)"/>

  <!-- Faint "blueprint floor" guides: a sparse, incomplete dot grid (parts laid out on the floor) -->
  <g fill="rgba(26,36,51,0.07)">
    <circle cx="90" cy="150" r="2"/>
    <circle cx="210" cy="150" r="2"/>
    <circle cx="330" cy="150" r="2"/>
    <circle cx="450" cy="150" r="2"/>
    <circle cx="570" cy="150" r="2"/>
    <circle cx="90" cy="290" r="2"/>
    <circle cx="210" cy="290" r="2"/>
    <circle cx="330" cy="290" r="2"/>
    <circle cx="450" cy="290" r="2"/>
    <circle cx="570" cy="290" r="2"/>
    <circle cx="90" cy="430" r="2"/>
    <circle cx="210" cy="430" r="2"/>
    <circle cx="330" cy="430" r="2"/>
    <circle cx="450" cy="430" r="2"/>
    <circle cx="570" cy="430" r="2"/>
  </g>

  <!-- Section label, mono -->
  <text x="60" y="78" font-family="IBM Plex Mono, monospace" font-size="11" fill="rgba(26,36,51,0.42)" letter-spacing="3">THE PARTS — UNASSEMBLED</text>

  <!-- ============================================================ -->
  <!-- Scattered, disconnected component tiles. No connecting lines. -->
  <!-- Slightly irregular positions + small rotations. -->
  <!-- ============================================================ -->

  <!-- Tile 1: Institutional Repositories -->
  <g transform="rotate(-5,165,160)">
    <rect x="55" y="120" width="220" height="80" rx="12" fill="rgba(28,100,196,0.10)" stroke="rgba(28,100,196,0.5)" stroke-width="1.5"/>
    <text x="165" y="152" font-family="IBM Plex Mono, monospace" font-size="9" fill="rgba(28,100,196,0.85)" text-anchor="middle" letter-spacing="2">REPOSITORY</text>
    <text x="165" y="176" font-family="DM Sans, sans-serif" font-size="15" fill="#1a2433" text-anchor="middle" font-weight="600">Institutional Repos</text>
  </g>

  <!-- Tile 2: Zenodo -->
  <g transform="rotate(6,400,135)">
    <rect x="315" y="98" width="170" height="74" rx="12" fill="rgba(13,148,136,0.09)" stroke="rgba(13,148,136,0.45)" stroke-width="1.5"/>
    <text x="400" y="128" font-family="IBM Plex Mono, monospace" font-size="9" fill="rgba(13,148,136,0.9)" text-anchor="middle" letter-spacing="2">ARCHIVE</text>
    <text x="400" y="151" font-family="DM Sans, sans-serif" font-size="16" fill="#1a2433" text-anchor="middle" font-weight="600">Zenodo</text>
  </g>

  <!-- Tile 3: OpenAIRE -->
  <g transform="rotate(-3,160,300)">
    <rect x="60" y="262" width="200" height="76" rx="12" fill="rgba(39,128,227,0.12)" stroke="rgba(39,128,227,0.5)" stroke-width="1.5"/>
    <text x="160" y="293" font-family="IBM Plex Mono, monospace" font-size="9" fill="rgba(39,128,227,0.9)" text-anchor="middle" letter-spacing="2">AGGREGATE</text>
    <text x="160" y="316" font-family="DM Sans, sans-serif" font-size="16" fill="#1a2433" text-anchor="middle" font-weight="600">OpenAIRE</text>
  </g>

  <!-- Tile 4: COAR Notify -->
  <g transform="rotate(8,430,300)">
    <rect x="330" y="262" width="200" height="76" rx="12" fill="rgba(28,100,196,0.10)" stroke="rgba(28,100,196,0.45)" stroke-width="1.5"/>
    <text x="430" y="293" font-family="IBM Plex Mono, monospace" font-size="9" fill="rgba(28,100,196,0.85)" text-anchor="middle" letter-spacing="2">INTEROP</text>
    <text x="430" y="316" font-family="DM Sans, sans-serif" font-size="16" fill="#1a2433" text-anchor="middle" font-weight="600">COAR Notify</text>
  </g>

  <!-- Tile 5: ORE (Open Reviews / Overlay) -->
  <g transform="rotate(-7,150,440)">
    <rect x="65" y="404" width="160" height="74" rx="12" fill="rgba(13,148,136,0.09)" stroke="rgba(13,148,136,0.45)" stroke-width="1.5"/>
    <text x="145" y="434" font-family="IBM Plex Mono, monospace" font-size="9" fill="rgba(13,148,136,0.9)" text-anchor="middle" letter-spacing="2">REVIEW</text>
    <text x="145" y="457" font-family="DM Sans, sans-serif" font-size="16" fill="#1a2433" text-anchor="middle" font-weight="600">ORE</text>
  </g>

  <!-- Tile 6: CoARA -->
  <g transform="rotate(4,420,445)">
    <rect x="300" y="408" width="240" height="76" rx="12" fill="rgba(39,128,227,0.10)" stroke="rgba(39,128,227,0.45)" stroke-width="1.5"/>
    <text x="420" y="439" font-family="IBM Plex Mono, monospace" font-size="9" fill="rgba(39,128,227,0.9)" text-anchor="middle" letter-spacing="2">ASSESSMENT</text>
    <text x="420" y="462" font-family="DM Sans, sans-serif" font-size="16" fill="#1a2433" text-anchor="middle" font-weight="600">CoARA</text>
  </g>

  <!-- A single small disconnected connector stub on one tile — implies the joints that were never made -->
  <line x1="278" y1="300" x2="318" y2="300" stroke="rgba(26,36,51,0.18)" stroke-width="1.5" stroke-dasharray="2 5"/>
  <line x1="245" y1="438" x2="295" y2="448" stroke="rgba(26,36,51,0.16)" stroke-width="1.5" stroke-dasharray="2 5"/>

  <!-- Vertical divider between diagram and title -->
  <line x1="640" y1="60" x2="640" y2="540" stroke="rgba(26,36,51,0.08)" stroke-width="1"/>

  <!-- ============================================================ -->
  <!-- Title block (right) -->
  <!-- ============================================================ -->
  <text x="1140" y="205" font-family="Georgia, serif" font-size="42" font-style="italic" fill="#1a2433" text-anchor="end">The infrastructure</text>
  <text x="1140" y="255" font-family="Georgia, serif" font-size="42" font-style="italic" fill="#1a2433" text-anchor="end">already exists.</text>
  <text x="1140" y="312" font-family="Georgia, serif" font-size="42" font-style="italic" fill="#1c64c4" text-anchor="end">Europe never</text>
  <text x="1140" y="362" font-family="Georgia, serif" font-size="42" font-style="italic" fill="#1c64c4" text-anchor="end">connected it.</text>

  <!-- Subtitle -->
  <text x="1140" y="416" font-family="DM Sans, sans-serif" font-size="15" fill="rgba(26,36,51,0.55)" text-anchor="end">Two policy actions, not more technology,</text>
  <text x="1140" y="438" font-family="DM Sans, sans-serif" font-size="15" fill="rgba(26,36,51,0.55)" text-anchor="end">would turn the parts into a system.</text>

  <!-- Mono event subtitle -->
  <text x="1140" y="492" font-family="IBM Plex Mono, monospace" font-size="12" fill="rgba(26,36,51,0.4)" text-anchor="end" letter-spacing="1">EU ERA FORUM · JUNE 2026</text>

  <!-- Bottom rule -->
  <line x1="0" y1="592" x2="1200" y2="592" stroke="rgba(26,36,51,0.1)" stroke-width="1"/>
  <text x="60" y="618" font-family="IBM Plex Mono, monospace" font-size="11" fill="rgba(26,36,51,0.35)" letter-spacing="1">PANDELIS PERAKAKIS · OPEN SCHOLAR · UCM</text>
</svg>
