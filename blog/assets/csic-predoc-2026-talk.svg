  <text x="28" y="400" font-family="IBM Plex Mono, monospace" font-size="9" fill="rgba(10,22,40,0.3)" text-anchor="middle" letter-spacing="2" transform="rotate(-90,28,400)">ARCHIVE</text>
  <text x="28" y="265" font-family="IBM Plex Mono, monospace" font-size="9" fill="rgba(10,22,40,0.3)" text-anchor="middle" letter-spacing="2" transform="rotate(-90,28,265)">REVIEW</text>
  <text x="28" y="135" font-family="IBM Plex Mono, monospace" font-size="9" fill="rgba(10,22,40,0.3)" text-anchor="middle" letter-spacing="2" transform="rotate(-90,28,135)">AGGREGATE</text>

  <!-- Policy sticky notes -->
  <rect x="790" y="110" width="180" height="85" rx="6" fill="#fde7b7" stroke="#c97a0a" stroke-width="1.5" transform="rotate(-2,880,152)"/>
  <text x="880" y="148" font-family="IBM Plex Mono, monospace" font-size="10" fill="#9a5e08" text-anchor="middle" letter-spacing="2" transform="rotate(-2,880,152)">MANDATE 01</text>
  <text x="880" y="170" font-family="DM Sans, sans-serif" font-size="13" fill="#5a3a04" text-anchor="middle" transform="rotate(-2,880,152)">Evaluate OA repos only</text>

  <rect x="800" y="230" width="180" height="85" rx="6" fill="#fde7b7" stroke="#c97a0a" stroke-width="1.5" transform="rotate(1.5,890,272)"/>
  <text x="890" y="268" font-family="IBM Plex Mono, monospace" font-size="10" fill="#9a5e08" text-anchor="middle" letter-spacing="2" transform="rotate(1.5,890,272)">MANDATE 02</text>
  <text x="890" y="290" font-family="DM Sans, sans-serif" font-size="13" fill="#5a3a04" text-anchor="middle" transform="rotate(1.5,890,272)">Mandate open reviews</text>

  <!-- Main title -->
  <text x="1000" y="390" font-family="Georgia, serif" font-size="40" font-style="italic" fill="#0a1628" text-anchor="middle">The pieces of</text>
  <text x="1000" y="438" font-family="Georgia, serif" font-size="40" font-style="italic" fill="#0a1628" text-anchor="middle">the puzzle</text>
  <text x="1000" y="486" font-family="Georgia, serif" font-size="40" font-style="italic" fill="#115b6e" text-anchor="middle">already exist.</text>

  <!-- Subtitle -->
  <text x="1000" y="535" font-family="IBM Plex Mono, monospace" font-size="12" fill="rgba(10,22,40,0.4)" text-anchor="middle" letter-spacing="1">CSIC Predoctoral Network · May 2026</text>

  <!-- Bottom rule -->
  <line x1="0" y1="610" x2="1200" y2="610" stroke="rgba(10,22,40,0.1)" stroke-width="1"/>
  <text x="60" y="624" font-family="IBM Plex Mono, monospace" font-size="11" fill="rgba(10,22,40,0.35)" letter-spacing="1">PANDELIS PERAKAKIS · OPEN SCHOLAR · UCM</text>
