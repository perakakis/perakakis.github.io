project:
  type: website
  output-dir: _site
  render:
    - "*.qmd"
    - "**/*.qmd"

execute:
  freeze: auto    # Don't re-run code unless source changes

website:
  title: "Pandelis Perakakis"
  favicon: images/favicon.svg
  description: "Associate Professor of Psychology at Complutense University of Madrid. Research on affect dynamics, psychophysiology, and scholarly communication."
  site-url: https://pandelisperakakis.info
  navbar:
    left:
      - href: index.qmd
        text: Home
      - text: Research
        menu:
          - text: "Overview"
            href: research/index.qmd
          - text: "---"
          - text: "Affect Dynamics"
            href: research/affect-dynamics/index.qmd
          - text: "Heartbeat-Evoked Potential"
            href: research/hep/index.qmd
          - text: "Exercise, Brain & Cognition"
            href: research/exercise-brain-cognition/index.qmd
          - text: "Scholarly Communication"
            href: research/scholarly-communication/index.qmd
      - href: software/index.qmd
        text: Software
      - href: publications/index.qmd
        text: Publications
      # - href: teaching/index.qmd
      #   text: Teaching
      - href: blog/index.qmd
        text: Blog

    right:
      - icon: github
        href: https://github.com/perakakis
      - icon: mortarboard-fill
        href: https://scholar.google.com/citations?user=5S-EVSAAAAAJ
      - icon: globe
        href: https://orcid.org/0000-0002-9130-3247
      - icon: linkedin
        href: https://www.linkedin.com/in/pandelis-perakakis-1369402a/

  page-footer:
    left: "© 2026 Pandelis Perakakis"
    right: "Built with [Quarto](https://quarto.org)"

  google-analytics: "G-YBLEE7645S"

  search: true        # Built-in search
  # reader-mode: true   # Clean reading mode toggle

format:
  html:
    theme:
      light: cosmo    # Or cosmo, litera, etc. — preview at https://bootswatch.com
      # dark: darkly
    css: styles.css
    toc: true