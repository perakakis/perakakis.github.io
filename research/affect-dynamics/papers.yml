- title: "Bistability and affect shift dynamics in the prediction of psychological well-being"
  date: "2025"
  authors: "Goicoechea, C., Dakos, V., Sanabria, D., Heshmati, S., Westhoff, M., Banos, O., Pomares, H., Hofmann, S.G., Perakakis, P."
  year: 2025
  journal: "Emotion"
  volume: "25(4)"
  pages: "982–996"
  doi: "10.1037/emo0001441"
  image: bistability.png
  description: "We show that bistability is a prevalent phenomenon in human affect dynamics and develop 10 novel metrics to characterise affect shift dynamics. The Positive-to-Negative Affect Shift Ratio (P2N-ASR) is a better predictor of psychological well-being compared to traditional intensity metrics."
  section: "Journal Articles"
  categories:
    - Affect dynamics
    - Bistability
    - Affect shift ratio
    - Well-being
