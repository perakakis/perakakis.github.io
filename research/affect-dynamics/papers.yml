- title: "“How Do You Feel?” Direct Valence Measurement Enables Affect Shift Metrics That Outperform Intensity-Based Predictors Of Psychological Well-Being"
  date: "2026"
  authors: "Goicoechea, C., Perakakis, P."
  year: 2026
  journal: "Preprint"
  volume: ""
  pages: ""
  doi: "https://doi.org/10.31234/osf.io/gmkc8_v1"
  image: regressions.png
