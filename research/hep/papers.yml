  date: "2019-01-01"
  authors: "Perakakis, P."
  year: 2019
  journal: "EEGLAB plugin / MATLAB toolbox"
  volume: ""
  pages: ""
  image: ""
  description: "Open-source EEGLAB plugin and standalone MATLAB toolbox for the automated detection of cardiac events (R-wave, T-wave) from raw ECG signals. Features an interactive GUI for artifact inspection and correction. Exports events to EEGLAB's EEG structure to facilitate heartbeat-evoked potential (HEP) analysis. Widely adopted by psychophysiology and cognitive neuroscience research groups."
