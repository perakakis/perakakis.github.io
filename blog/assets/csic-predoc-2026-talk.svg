  <rect x="200" y="215" width="130" height="95" rx="10" fill="rgba(91,138,58,0.09)" stroke="rgba(45,100,25,0.35)" stroke-width="1.5"/>
  <text x="265" y="258" font-family="DM Sans, sans-serif" font-size="12" fill="#0a1628" text-anchor="middle">Eval Committees</text>

  <rect x="345" y="215" width="130" height="95" rx="10" fill="rgba(91,138,58,0.09)" stroke="rgba(45,100,25,0.35)" stroke-width="1.5"/>
  <text x="410" y="265" font-family="DM Sans, sans-serif" font-size="12" fill="#0a1628" text-anchor="middle">PCI</text>

  <rect x="490" y="215" width="175" height="95" rx="10" fill="rgba(91,138,58,0.09)" stroke="rgba(45,100,25,0.35)" stroke-width="1.5"/>
  <text x="577" y="258" font-family="DM Sans, sans-serif" font-size="12" fill="#0a1628" text-anchor="middle">Scientific Societies</text>

