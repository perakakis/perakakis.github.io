- title: "Bistability and affect shift dynamics in the prediction of psychological well-being"
  date: "2025-01-01"
  authors: "Goicoechea, C., Dakos, V., Sanabria, D., Ciria, L. F., & Perakakis, P."
  year: 2025
  journal: "Emotion"
  volume: "25(4)"
  pages: "982–996"
  doi: "10.1037/emo0001441"
