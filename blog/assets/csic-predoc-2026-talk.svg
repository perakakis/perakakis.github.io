  <rect x="100" y="85" width="195" height="95" rx="10" fill="rgba(58,91,138,0.1)" stroke="rgba(25,55,110,0.35)" stroke-width="1.5"/>
  <text x="197" y="137" font-family="DM Sans, sans-serif" font-size="15" fill="#0a1628" text-anchor="middle">OpenAIRE</text>

  <rect x="315" y="85" width="195" height="95" rx="10" fill="rgba(58,91,138,0.1)" stroke="rgba(25,55,110,0.35)" stroke-width="1.5"/>
  <text x="412" y="137" font-family="DM Sans, sans-serif" font-size="15" fill="#0a1628" text-anchor="middle">GraspOS</text>

