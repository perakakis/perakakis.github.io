<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1c64c4"/>
      <stop offset="100%" stop-color="#2780e3"/>
    </linearGradient>
  </defs>

  <!-- White background -->
  <rect width="1200" height="630" fill="#ffffff"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="200" x2="730" y2="200" stroke="rgba(26,36,51,0.06)" stroke-width="1"/>
  <line x1="0" y1="330" x2="730" y2="330" stroke="rgba(26,36,51,0.06)" stroke-width="1"/>
  <line x1="0" y1="455" x2="730" y2="455" stroke="rgba(26,36,51,0.06)" stroke-width="1"/>
  <line x1="730" y1="0" x2="730" y2="630" stroke="rgba(26,36,51,0.06)" stroke-width="1"/>

  <!-- Site-blue accent bar top -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#blue)"/>

  <!-- Faint vertical flow connectors (community -> archive -> evaluate -> aggregate) -->
  <line x1="360" y1="180" x2="360" y2="475" stroke="rgba(39,128,227,0.18)" stroke-width="1.5" stroke-dasharray="3 5"/>
  <line x1="150" y1="310" x2="150" y2="475" stroke="rgba(39,128,227,0.14)" stroke-width="1.5" stroke-dasharray="3 5"/>
  <line x1="560" y1="310" x2="560" y2="475" stroke="rgba(39,128,227,0.14)" stroke-width="1.5" stroke-dasharray="3 5"/>

  <!-- Row: Aggregate (OpenAIRE) -->
  <rect x="240" y="85" width="240" height="92" rx="10" fill="rgba(28,100,196,0.13)" stroke="rgba(28,100,196,0.55)" stroke-width="1.5"/>
  <text x="360" y="118" font-family="IBM Plex Mono, monospace" font-size="10" fill="rgba(28,100,196,0.9)" text-anchor="middle" letter-spacing="2">AGGREGATE</text>
  <text x="360" y="145" font-family="DM Sans, sans-serif" font-size="17" fill="#1a2433" text-anchor="middle" font-weight="600">OpenAIRE</text>

  <!-- Row: Evaluate -->
  <rect x="55" y="215" width="185" height="95" rx="10" fill="rgba(13,148,136,0.08)" stroke="rgba(13,148,136,0.4)" stroke-width="1.5"/>
  <text x="147" y="268" font-family="DM Sans, sans-serif" font-size="13" fill="#1a2433" text-anchor="middle">Funding Agencies</text>

  <rect x="255" y="215" width="185" height="95" rx="10" fill="rgba(13,148,136,0.08)" stroke="rgba(13,148,136,0.4)" stroke-width="1.5"/>
  <text x="347" y="268" font-family="DM Sans, sans-serif" font-size="13" fill="#1a2433" text-anchor="middle">Evaluation Committees</text>

  <rect x="455" y="215" width="200" height="95" rx="10" fill="rgba(13,148,136,0.08)" stroke="rgba(13,148,136,0.4)" stroke-width="1.5"/>
  <text x="555" y="268" font-family="DM Sans, sans-serif" font-size="13" fill="#1a2433" text-anchor="middle">Scientific Societies</text>

  <!-- Row: Archive -->
  <rect x="55" y="345" width="190" height="95" rx="10" fill="rgba(39,128,227,0.1)" stroke="rgba(39,128,227,0.4)" stroke-width="1.5"/>
  <text x="150" y="383" font-family="IBM Plex Mono, monospace" font-size="10" fill="rgba(39,128,227,0.9)" text-anchor="middle" letter-spacing="2">ARCHIVE</text>
  <text x="150" y="406" font-family="DM Sans, sans-serif" font-size="14" fill="#1a2433" text-anchor="middle">Institutional Repos</text>

  <rect x="265" y="345" width="190" height="95" rx="10" fill="rgba(39,128,227,0.2)" stroke="rgba(39,128,227,0.65)" stroke-width="1.5"/>
  <text x="360" y="383" font-family="IBM Plex Mono, monospace" font-size="10" fill="rgba(39,128,227,0.9)" text-anchor="middle" letter-spacing="2">ARCHIVE</text>
  <text x="360" y="406" font-family="DM Sans, sans-serif" font-size="14" fill="#1a2433" text-anchor="middle" font-weight="600">DIGITAL.CSIC</text>

  <rect x="475" y="345" width="180" height="95" rx="10" fill="rgba(39,128,227,0.1)" stroke="rgba(39,128,227,0.4)" stroke-width="1.5"/>
  <text x="565" y="383" font-family="IBM Plex Mono, monospace" font-size="10" fill="rgba(39,128,227,0.9)" text-anchor="middle" letter-spacing="2">ARCHIVE</text>
  <text x="565" y="406" font-family="DM Sans, sans-serif" font-size="14" fill="#1a2433" text-anchor="middle">Zenodo</text>

  <!-- Row: Community (the base layer) -->
  <rect x="55" y="470" width="600" height="80" rx="10" fill="rgba(39,128,227,0.06)" stroke="rgba(39,128,227,0.32)" stroke-width="1.5"/>
  <text x="355" y="505" font-family="DM Sans, sans-serif" font-size="16" fill="#1a2433" text-anchor="middle" font-weight="600">Scholarly Community</text>
  <text x="355" y="528" font-family="DM Sans, sans-serif" font-size="12" fill="rgba(26,36,51,0.6)" text-anchor="middle">the authors of every research output — and the drivers</text>

  <!-- Band labels -->
  <text x="30" y="131" font-family="IBM Plex Mono, monospace" font-size="9" fill="rgba(26,36,51,0.3)" text-anchor="middle" letter-spacing="2" transform="rotate(-90,30,131)">AGGREGATE</text>
  <text x="30" y="262" font-family="IBM Plex Mono, monospace" font-size="9" fill="rgba(26,36,51,0.3)" text-anchor="middle" letter-spacing="2" transform="rotate(-90,30,262)">EVALUATE</text>
  <text x="30" y="392" font-family="IBM Plex Mono, monospace" font-size="9" fill="rgba(26,36,51,0.3)" text-anchor="middle" letter-spacing="2" transform="rotate(-90,30,392)">ARCHIVE</text>
  <text x="30" y="510" font-family="IBM Plex Mono, monospace" font-size="9" fill="rgba(26,36,51,0.3)" text-anchor="middle" letter-spacing="2" transform="rotate(-90,30,510)">COMMUNITY</text>

  <!-- Policy actions (sticky notes) -->
  <rect x="760" y="120" width="185" height="85" rx="6" fill="#fde7b7" stroke="#c97a0a" stroke-width="1.5" transform="rotate(-2,852,162)"/>
  <text x="852" y="158" font-family="IBM Plex Mono, monospace" font-size="10" fill="#9a5e08" text-anchor="middle" letter-spacing="2" transform="rotate(-2,852,162)">ACTION 01</text>
  <text x="852" y="180" font-family="DM Sans, sans-serif" font-size="13" fill="#5a3a04" text-anchor="middle" transform="rotate(-2,852,162)">Evaluate OA repos only</text>

  <rect x="775" y="245" width="185" height="85" rx="6" fill="#fde7b7" stroke="#c97a0a" stroke-width="1.5" transform="rotate(1.5,867,287)"/>
  <text x="867" y="283" font-family="IBM Plex Mono, monospace" font-size="10" fill="#9a5e08" text-anchor="middle" letter-spacing="2" transform="rotate(1.5,867,287)">ACTION 02</text>
  <text x="867" y="305" font-family="DM Sans, sans-serif" font-size="13" fill="#5a3a04" text-anchor="middle" transform="rotate(1.5,867,287)">Mandate open reviews</text>

  <!-- Main title -->
  <text x="975" y="406" font-family="Georgia, serif" font-size="31" font-style="italic" fill="#1a2433" text-anchor="middle">Open infrastructures</text>
  <text x="975" y="445" font-family="Georgia, serif" font-size="31" font-style="italic" fill="#1a2433" text-anchor="middle">in support of</text>
  <text x="975" y="484" font-family="Georgia, serif" font-size="31" font-style="italic" fill="#1c64c4" text-anchor="middle">research assessment reform</text>

  <!-- Subtitle -->
  <text x="975" y="540" font-family="IBM Plex Mono, monospace" font-size="12" fill="rgba(26,36,51,0.4)" text-anchor="middle" letter-spacing="1">EU ERA FORUM · JUNE 2026</text>

  <!-- Bottom rule -->
  <line x1="0" y1="610" x2="1200" y2="610" stroke="rgba(26,36,51,0.1)" stroke-width="1"/>
  <text x="60" y="624" font-family="IBM Plex Mono, monospace" font-size="11" fill="rgba(26,36,51,0.35)" letter-spacing="1">PANDELIS PERAKAKIS · OPEN SCHOLAR · UCM</text>
</svg>
